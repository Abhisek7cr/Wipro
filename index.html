<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Abhishek Swain</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
        }
        
        .nav {
            background-color: indigo;
            height: 10vh;
            display: flex;
            justify-content: space-between;
            align-items: center; 
            padding: 0 50px; 
        }
        
        .logo a {
            color: white;
            font-size: 22px;
            text-decoration: none;
            font-weight: bold;
        }
        
        .nav ul {
            display: flex;
            list-style: none;
        }
        
        .nav ul li {
            margin: 0 15px;
        }
        
        .nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        .nav ul li a:hover {
            color: lightgray;
        }

        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
            text-align: center;
            padding: 20px;
        }
        
        .main img {
            height: 250px;
            width: 250px; 
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .main p {
            font-size: 20px;
            margin-top: 20px;
            color: #333;
            max-width: 60%;
            line-height: 1.5;
        }

        footer {
            background-color: indigo;
            color: white;
            text-align: center;
            padding: 20px 0;
            width: 100%;
        }

        .footer-content h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .social-links a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        .social-links a:hover {
            text-decoration: underline;
            color: lightgray;
        }
    </style>
</head>
<body>
    <div class="nav">
        <h2 class="logo"><a href="index.html">Abhishek Swain</a></h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="https://abhisek7cr.github.io/Wipro/about">About Me</a></li>
        </ul>
    </div>
    <div class="main">
        <img src="pic.jpg" alt="Profile Picture">
        <p>I am a final-year student passionate about web development and UI/UX design. My skills include HTML, CSS, Java, JavaScript, Figma, and frontend development.  
            I enjoy creating visually appealing and user-friendly interfaces.</p>
    </div>
    <footer>
        <div class="footer-content">
            <h2>Contact Me</h2>
            <div class="social-links">
                <a href="mailto:swainabhisekcr7@gmail.com" target="_blank">Gmail</a>
                <a href="https://www.linkedin.com/in/abhisek-swain-26588326b/" target="_blank">LinkedIn</a>
                <a href="https://github.com/Abhisek7cr" target="_blank">GitHub</a>
            </div>
        </div>
    </footer>
</body>
</html>
